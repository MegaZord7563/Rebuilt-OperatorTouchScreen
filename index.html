<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Interface Rebuilt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- This starts the NetworkTables websocket, it can be accessed from multiple
     pages simultaneously -->
    <script src="/networktables/networktables.js"></script>

    <!-- Obviously, you will want to copy this file locally in a real 
         dashboard, as the Driver Station won't have internet access -->
    <script src="https://code.jquery.com/jquery-2.2.2.min.js"></script>

    <div class="nav">
        <img src="assets/mega.png" alt="">

        <div class="connected">
            <h2 class="connected-tiulo"> CONNECTED:</h2>

            <div class="status" id="toggleStatus">
                <div class="status-opcoes off">OFF</div>
                <div class="status-opcoes on">ON</div>
            </div>
        </div>

        <img src="assets/zord.png" alt="">
    </div>


    <div class="conteudo">
        <div class="card-tempo">
            <div class="icone-relogio">
                <img src="assets/Clock.png" alt="">
            </div>

            <p id="dm" class="numero-tempo"> 0 </p>
            <p id="m" class="numero-tempo"> 2 </p>
            <p class="numero-tempo"> - </p>
            <p id="ds" class="numero-tempo"> 2 </p>
            <p id="s" class="numero-tempo"> 0 </p>
        </div>

        <div class="field">
            <img src="assets/fieldblack.png" alt="">

            <button class="a"></button>
            <button class="b"></button>
            <button class="c"></button>
            <button class="d"></button>
            <button class="e"></button>
            <button class="f"></button>
            <button class="g"></button>
            <button class="h"></button>
            <button class="i"></button>
            <button class="j"></button>
            <button class="k"></button>
            <button class="l"></button>
            <button class="m"></button>
            <button class="n"></button>
            <button class="o"></button>
            <button class="p"></button>
        </div>
    </div>


    <script>
        $(document).ready(function () {
            // NetworkTables listeners
            NetworkTables.addWsConnectionListener(onNetworkTablesConnection, true);
            NetworkTables.addRobotConnectionListener(onRobotConnection, true);

            // Listener da chave "Match time", recebe valor inicial
            NetworkTables.addKeyListener("Match time", function (key, value, isNew) {
                let matchTime = value;

                console.log(matchTime);

                // Se o valor for -1, considera 0
                if (matchTime == -1) matchTime = 0;

                // Calcula minutos e segundos
                let minutes = Math.trunc(matchTime / 60);
                let seconds = Math.trunc(matchTime % 60);

                // Décimos de segundo
                let dsec = Math.trunc((matchTime - Math.trunc(matchTime)) * 10);

                // Atualiza os elementos do HTML
                document.getElementById("m").textContent = String(minutes).padStart(2, '0');
                document.getElementById("s").textContent = String(seconds).padStart(2, '0');
                document.getElementById("dm").textContent = dsec;
            }, true); // importante: true para receber valor inicial
        });



        function onRobotConnection(connected) {
            const toggle = document.getElementById("toggleStatus");

            // Change toggle switch state
            if (!connected) {
                toggle.classList.add("off");
            } else {
                toggle.classList.remove("off");
            }

        }

        function onNetworkTablesConnection(connected) {
            if (!connected) {
                console.log("NTs not connected")
                alert("NTs not connected")
            }
            else {
                console.log("NTs connected")
            }
        }

    </script>


</body>

</html>
